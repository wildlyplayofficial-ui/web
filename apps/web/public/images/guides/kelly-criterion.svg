<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="16" fill="#f4f6f8"/>
  <text x="400" y="45" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#0d1117">Kelly Criterion — Optimal Stake</text>
  <!-- Axes -->
  <line x1="100" y1="60" x2="100" y2="310" stroke="#e2e6ea" stroke-width="2"/>
  <line x1="100" y1="310" x2="720" y2="310" stroke="#e2e6ea" stroke-width="2"/>
  <text x="90" y="55" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" fill="#5b6572">Growth</text>
  <text x="730" y="325" font-family="system-ui,sans-serif" font-size="12" fill="#5b6572">Stake %</text>
  <!-- Bell curve -->
  <path d="M120,290 C160,280 200,240 260,160 C300,110 330,85 370,75 C410,85 440,110 480,160 C540,240 580,280 620,290" stroke="#00c853" stroke-width="3" fill="#00c853" fill-opacity="0.06"/>
  <!-- Optimal peak marker -->
  <line x1="370" y1="75" x2="370" y2="310" stroke="#00c853" stroke-width="2" stroke-dasharray="6,4"/>
  <circle cx="370" cy="75" r="8" fill="#00c853" stroke="#fff" stroke-width="2"/>
  <text x="370" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="800" fill="#00c853">f* = optimal</text>
  <!-- Danger zone -->
  <rect x="480" y="160" width="160" height="150" rx="6" fill="#e5484d" fill-opacity="0.06"/>
  <text x="560" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#e5484d">Over-betting</text>
  <text x="560" y="268" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#e5484d">= ruin risk</text>
  <!-- Under-betting zone -->
  <text x="200" y="268" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#5b6572">Under-betting</text>
  <text x="200" y="284" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5b6572">= slower growth</text>
  <!-- X-axis labels -->
  <text x="160" y="335" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5b6572">2%</text>
  <text x="260" y="335" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5b6572">5%</text>
  <text x="370" y="335" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#00c853">~8%</text>
  <text x="480" y="335" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5b6572">15%</text>
  <text x="580" y="335" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5b6572">25%</text>
  <!-- Formula -->
  <rect x="100" y="350" width="600" height="36" rx="8" fill="#00c853" fill-opacity="0.08" stroke="#00c853" stroke-opacity="0.3"/>
  <text x="400" y="373" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#0d1117">f* = (bp − q) / b  ·  Maximizes long-term bankroll growth  ·  Fraction Kelly = safer</text>
</svg>
