<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui,sans-serif">
  <rect width="800" height="400" fill="#f4f6f8" rx="16"/>
  <text x="400" y="45" text-anchor="middle" font-size="20" font-weight="700" fill="#0d1117">Responsible Play</text>

  <!-- Box 1: Set Limits -->
  <g transform="translate(60,85)">
    <rect width="200" height="195" rx="14" fill="#fff" stroke="#e2e6ea" stroke-width="1.5"/>
    <rect width="200" height="6" rx="3" fill="#00c853"/>
    <text x="100" y="55" text-anchor="middle" font-size="36">💰</text>
    <text x="100" y="95" text-anchor="middle" font-size="16" font-weight="700" fill="#0d1117">Set Limits</text>
    <text x="100" y="120" text-anchor="middle" font-size="12" fill="#5b6572">Define your budget</text>
    <text x="100" y="140" text-anchor="middle" font-size="12" fill="#5b6572">before you start.</text>
    <text x="100" y="168" text-anchor="middle" font-size="11" fill="#5b6572">Daily, weekly, monthly</text>
    <text x="100" y="185" text-anchor="middle" font-size="11" fill="#5b6572">— and stick to them.</text>
  </g>

  <!-- Box 2: Never Chase -->
  <g transform="translate(300,85)">
    <rect width="200" height="195" rx="14" fill="#fff" stroke="#e2e6ea" stroke-width="1.5"/>
    <rect width="200" height="6" rx="3" fill="#e5484d"/>
    <text x="100" y="55" text-anchor="middle" font-size="36">🛑</text>
    <text x="100" y="95" text-anchor="middle" font-size="16" font-weight="700" fill="#0d1117">Never Chase</text>
    <text x="100" y="120" text-anchor="middle" font-size="12" fill="#5b6572">Losses are part of</text>
    <text x="100" y="140" text-anchor="middle" font-size="12" fill="#5b6572">the game. Accept them.</text>
    <text x="100" y="168" text-anchor="middle" font-size="11" fill="#5b6572">Chasing losses leads</text>
    <text x="100" y="185" text-anchor="middle" font-size="11" fill="#5b6572">to bigger losses.</text>
  </g>

  <!-- Box 3: Stay in Control -->
  <g transform="translate(540,85)">
    <rect width="200" height="195" rx="14" fill="#fff" stroke="#e2e6ea" stroke-width="1.5"/>
    <rect width="200" height="6" rx="3" fill="#00c853"/>
    <text x="100" y="55" text-anchor="middle" font-size="36">⏸️</text>
    <text x="100" y="95" text-anchor="middle" font-size="16" font-weight="700" fill="#0d1117">Stay in Control</text>
    <text x="100" y="120" text-anchor="middle" font-size="12" fill="#5b6572">Take breaks. Step away</text>
    <text x="100" y="140" text-anchor="middle" font-size="12" fill="#5b6572">when emotions run high.</text>
    <text x="100" y="168" text-anchor="middle" font-size="11" fill="#5b6572">Clear head = better</text>
    <text x="100" y="185" text-anchor="middle" font-size="11" fill="#5b6572">decisions, always.</text>
  </g>

  <!-- Footer annotation bar -->
  <rect x="60" y="330" width="680" height="50" rx="10" fill="#00c853" fill-opacity="0.08"/>
  <text x="400" y="360" text-anchor="middle" font-size="13" font-weight="600" fill="#5b6572">Entertainment only — never risk what you can't afford to lose</text>
</svg>