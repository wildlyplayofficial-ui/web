<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="16" fill="#f4f6f8"/>
  <text x="400" y="45" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#0d1117">De-Vig Methods Compared</text>
  <!-- Table header -->
  <rect x="60" y="70" width="680" height="40" rx="8" fill="#00c853" fill-opacity="0.1"/>
  <text x="180" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0d1117">Method</text>
  <text x="370" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0d1117">How it works</text>
  <text x="600" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0d1117">Best for</text>
  <!-- Row 1: Multiplicative -->
  <line x1="60" y1="120" x2="740" y2="120" stroke="#e2e6ea" stroke-width="1"/>
  <text x="180" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#00c853">Multiplicative</text>
  <text x="370" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#0d1117">Divide each implied % by total</text>
  <text x="600" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#5b6572">Quick estimate</text>
  <!-- Row 2: Additive -->
  <line x1="60" y1="165" x2="740" y2="165" stroke="#e2e6ea" stroke-width="1"/>
  <text x="180" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#009e42">Additive</text>
  <text x="370" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#0d1117">Subtract equal share of margin</text>
  <text x="600" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#5b6572">Even markets</text>
  <!-- Row 3: Shin -->
  <line x1="60" y1="210" x2="740" y2="210" stroke="#e2e6ea" stroke-width="1"/>
  <text x="180" y="235" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0077b6">Shin</text>
  <text x="370" y="235" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#0d1117">Insider info model (z parameter)</text>
  <text x="600" y="235" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#5b6572">3+ outcomes</text>
  <!-- Row 4: Power -->
  <line x1="60" y1="255" x2="740" y2="255" stroke="#e2e6ea" stroke-width="1"/>
  <text x="180" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#6b4c9a">Power</text>
  <text x="370" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#0d1117">Raise odds to power k, solve for k</text>
  <text x="600" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#5b6572">Most accurate (2-way)</text>
  <line x1="60" y1="300" x2="740" y2="300" stroke="#e2e6ea" stroke-width="1"/>
  <!-- Footer -->
  <rect x="100" y="330" width="600" height="50" rx="8" fill="#00c853" fill-opacity="0.08" stroke="#00c853" stroke-opacity="0.3"/>
  <text x="400" y="350" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#0d1117">Example: Odds 1.85 / 2.05 → Multiplicative: 52.6% / 47.4%</text>
  <text x="400" y="370" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#5b6572">Power method is most accurate for 2-way markets · Shin for multi-way (1X2)</text>
</svg>
