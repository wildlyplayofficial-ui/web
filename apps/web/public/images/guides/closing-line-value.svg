<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="16" fill="#f4f6f8"/>
  <text x="400" y="45" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#0d1117">Closing Line Value (CLV)</text>
  <!-- Axes -->
  <line x1="120" y1="80" x2="120" y2="300" stroke="#e2e6ea" stroke-width="2"/>
  <line x1="120" y1="300" x2="700" y2="300" stroke="#e2e6ea" stroke-width="2"/>
  <text x="110" y="75" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" fill="#5b6572">Odds</text>
  <text x="710" y="315" font-family="system-ui,sans-serif" font-size="12" fill="#5b6572">Time</text>
  <!-- Price line (declining) -->
  <path d="M160,140 C250,145 350,160 450,180 C500,190 550,200 600,220" stroke="#5b6572" stroke-width="2.5" fill="none"/>
  <!-- Entry point -->
  <circle cx="200" cy="142" r="10" fill="#00c853" stroke="#fff" stroke-width="2"/>
  <text x="200" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#00c853">Entry 2.10</text>
  <!-- Close point -->
  <circle cx="600" cy="220" r="10" fill="#e5484d" stroke="#fff" stroke-width="2"/>
  <text x="600" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#e5484d">Close 1.95</text>
  <!-- Delta arrow -->
  <line x1="220" y1="145" x2="580" y2="218" stroke="#00c853" stroke-width="1.5" stroke-dasharray="8,4"/>
  <!-- CLV badge -->
  <rect x="330" y="155" width="130" height="40" rx="10" fill="#00c853" fill-opacity="0.12" stroke="#00c853" stroke-width="2"/>
  <text x="395" y="181" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#00c853">CLV +7.7%</text>
  <!-- Labels -->
  <text x="160" y="320" font-family="system-ui,sans-serif" font-size="12" fill="#5b6572">Published</text>
  <text x="570" y="320" font-family="system-ui,sans-serif" font-size="12" fill="#5b6572">Kickoff</text>
  <!-- Footer -->
  <rect x="100" y="345" width="600" height="36" rx="8" fill="#00c853" fill-opacity="0.08" stroke="#00c853" stroke-opacity="0.3"/>
  <text x="400" y="368" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#0d1117">Positive CLV = you got better odds than the market at close = long-term edge</text>
</svg>
