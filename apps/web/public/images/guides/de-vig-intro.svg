<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="16" fill="#f4f6f8"/>
  <text x="400" y="45" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#0d1117">What Is De-Vigging?</text>
  <!-- Three columns flow -->
  <!-- Col 1: Bookmaker odds -->
  <rect x="60" y="90" width="200" height="200" rx="12" fill="#fff" stroke="#e2e6ea" stroke-width="2"/>
  <text x="160" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#5b6572">BOOKMAKER ODDS</text>
  <text x="160" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#0d1117">1.91</text>
  <text x="160" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#5b6572">Home</text>
  <text x="160" y="230" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#0d1117">1.91</text>
  <text x="160" y="255" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#5b6572">Away</text>
  <text x="160" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#e5484d">Total implied: 104.7%</text>
  <!-- Arrow 1 -->
  <path d="M275,190 L310,190" stroke="#00c853" stroke-width="3" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#00c853"/></marker></defs>
  <!-- Col 2: Remove vig -->
  <rect x="320" y="130" width="160" height="120" rx="12" fill="#00c853" fill-opacity="0.1" stroke="#00c853" stroke-width="2"/>
  <text x="400" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#00c853">REMOVE VIG</text>
  <text x="400" y="195" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#0d1117">−4.7% margin</text>
  <text x="400" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#5b6572">Bookmaker's profit</text>
  <!-- Arrow 2 -->
  <path d="M495,190 L530,190" stroke="#00c853" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- Col 3: True probability -->
  <rect x="540" y="90" width="200" height="200" rx="12" fill="#fff" stroke="#00c853" stroke-width="2"/>
  <text x="640" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#00c853">TRUE PROBABILITY</text>
  <text x="640" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#00c853">50.0%</text>
  <text x="640" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#5b6572">Home (fair: 2.00)</text>
  <text x="640" y="230" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#00c853">50.0%</text>
  <text x="640" y="255" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#5b6572">Away (fair: 2.00)</text>
  <text x="640" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#00c853">Total: 100.0% ✓</text>
  <!-- Footer -->
  <rect x="100" y="340" width="600" height="40" rx="8" fill="#00c853" fill-opacity="0.08" stroke="#00c853" stroke-opacity="0.3"/>
  <text x="400" y="365" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#0d1117">Remove the bookmaker margin to find the true implied probability of each outcome</text>
</svg>
