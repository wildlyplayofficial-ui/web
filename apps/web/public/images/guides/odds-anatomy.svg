<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui,sans-serif">
  <rect width="800" height="400" fill="#f4f6f8" rx="16"/>
  <text x="400" y="45" text-anchor="middle" font-size="20" font-weight="700" fill="#0d1117">How to Read Betting Odds</text>

  <!-- 4 format boxes -->
  <g transform="translate(60,80)">
    <rect width="150" height="160" rx="12" fill="#fff" stroke="#e2e6ea" stroke-width="1.5"/>
    <text x="75" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#5b6572">Decimal</text>
    <text x="75" y="85" text-anchor="middle" font-size="36" font-weight="700" fill="#0d1117">2.50</text>
    <text x="75" y="115" text-anchor="middle" font-size="12" fill="#5b6572">Stake × 2.50</text>
    <text x="75" y="145" text-anchor="middle" font-size="12" fill="#5b6572">= total return</text>
  </g>

  <g transform="translate(230,80)">
    <rect width="150" height="160" rx="12" fill="#fff" stroke="#e2e6ea" stroke-width="1.5"/>
    <text x="75" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#5b6572">American</text>
    <text x="75" y="85" text-anchor="middle" font-size="36" font-weight="700" fill="#0d1117">+150</text>
    <text x="75" y="115" text-anchor="middle" font-size="12" fill="#5b6572">Win $150</text>
    <text x="75" y="145" text-anchor="middle" font-size="12" fill="#5b6572">on $100 stake</text>
  </g>

  <g transform="translate(400,80)">
    <rect width="150" height="160" rx="12" fill="#fff" stroke="#e2e6ea" stroke-width="1.5"/>
    <text x="75" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#5b6572">Fractional</text>
    <text x="75" y="85" text-anchor="middle" font-size="36" font-weight="700" fill="#0d1117">6/4</text>
    <text x="75" y="115" text-anchor="middle" font-size="12" fill="#5b6572">Win 6 units</text>
    <text x="75" y="145" text-anchor="middle" font-size="12" fill="#5b6572">for every 4 staked</text>
  </g>

  <g transform="translate(570,80)">
    <rect width="150" height="160" rx="12" fill="#fff" stroke="#e2e6ea" stroke-width="1.5"/>
    <text x="75" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#5b6572">Hong Kong</text>
    <text x="75" y="85" text-anchor="middle" font-size="36" font-weight="700" fill="#0d1117">1.50</text>
    <text x="75" y="115" text-anchor="middle" font-size="12" fill="#5b6572">Win 1.50 units</text>
    <text x="75" y="145" text-anchor="middle" font-size="12" fill="#5b6572">per 1 staked</text>
  </g>

  <!-- Arrow connecting all boxes -->
  <line x1="210" y1="280" x2="570" y2="280" stroke="#00c853" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="570,276 580,280 570,284" fill="#00c853"/>
  <polygon points="210,276 200,280 210,284" fill="#00c853"/>

  <!-- Center label on arrow -->
  <rect x="290" y="268" width="200" height="24" rx="12" fill="#00c853" fill-opacity="0.12"/>
  <text x="390" y="285" text-anchor="middle" font-size="13" font-weight="600" fill="#00c853">All = 40% implied probability</text>

  <!-- Footer annotation bar -->
  <rect x="40" y="330" width="720" height="44" rx="10" fill="#00c853" fill-opacity="0.08"/>
  <text x="400" y="357" text-anchor="middle" font-size="13" fill="#5b6572">Different formats, same meaning — choose whichever you find most intuitive</text>
</svg>